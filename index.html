<html lang="en">
<head>

<style>
  /* ----------  MORGANITE (local display font)  ---------- */
  @font-face {
    font-family: "Morganite";
    src: url("./assets/fonts/MORGANITE-BLACK.TTF") format("truetype");
    font-weight: 900;
    font-style: normal;
    font-display: swap;
  }

  @font-face {
    font-family: "Morganite";
    src: url("./assets/fonts/MORGANITE-BOLD.TTF") format("truetype");
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }

  @font-face {
    font-family: "Morganite";
    src: url("./assets/fonts/Morganite-Medium.ttf") format("truetype");
    font-weight: 500;
    font-style: normal;
    font-display: swap;
  }

  @font-face {
    font-family: "Morganite";
    src: url("./assets/fonts/Morganite-Thin.ttf") format("truetype");
    font-weight: 100;
    font-style: normal;
    font-display: swap;
  }

  /* ----------  TOKENS  ---------- */
  :root {
    --bg-dark: #000000;
    --bg-card: #141414;
    --yellow: #f4c026;
    --yellow-deep: #e9b21f;
    --white: #ffffff;
    --muted: #c9c9c9;

    /* Contact form */
    --form-bg: #3E4349;
    --field-bg: #ffffff;
    --label: #ffffff;
    --field-text: #1f2a44;
    --input-border: #ffffff;
    --placeholder: #64748b;
    --button-bg: #fbbf24;
    --button-hover: #f8b81f;
    --button-text: #111827;
    --focus-border: #ffffff;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    background: #000000;
    font-family: "Morganite", "Barlow Condensed", system-ui, sans-serif;
    color: var(--white);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
  }

  /* ----------  PAGE FRAME  ---------- */
  .page {
    width: 100%;
    max-width: 402px;
    margin: 0 auto;
    background: #000000;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* ----------  HERO / LANDING  ---------- */
  .hero {
    padding: 0 26px 32px;
    position: relative;
    background: #000000;
    isolation: isolate;
  }

  /* Hero video */
  .hero-video-wrap {
    position: relative;
    z-index: 1;
    width: calc(100% + 52px);
    height: 385px;
    margin-left: -26px;
    margin-right: -26px;
    margin-top: 0;
    padding-top: 68px;
    background: #000000;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    overflow: hidden;
  }

  .hero-video {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 315px;
    display: block;
    background: #000000;
    object-fit: cover;
    object-position: center center;
    transform: none;
  }

  /* Big headline block */
  .headline {
    margin-top: 46px;
    width: 190px;
    font-family: "Morganite", "Barlow Condensed", "Inter", sans-serif;
    text-transform: uppercase;
    letter-spacing: 0;
    line-height: 0.82;
    color: var(--white);
  }

  .headline .line-1 {
    font-size: 60px;
    font-weight: 700;
    letter-spacing: 0;
    line-height: 0.78;
    margin-bottom: 6px;
    white-space: nowrap;
  }

  .headline .accent {
    color: var(--yellow);
  }

  .headline .line-2 {
    font-size: 135px;
    font-weight: 900;
    line-height: 0.78;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    white-space: nowrap;
  }

  .headline .line-2 .and {
    font-size: 135px;
    font-weight: 100;
    line-height: 0.78;
    letter-spacing: 0.01em;
    color: var(--white);
  }

  .headline .line-3 {
    font-size: 135px;
    font-weight: 900;
    line-height: 0.78;
    display: block;
  }

  .headline .line-4 {
    font-size: 50px;
    font-weight: 500;
    letter-spacing: 0;
    line-height: 0.8;
    margin-top: 0;
  }

  /* social icons row */
  .socials {
    display: flex;
    align-items: center;
    gap: 22px;
    margin-top: 18px;
    font-family: "Morganite", "Barlow Condensed", sans-serif;
    font-size: 60px;
    font-weight: 700;
    line-height: 0.8;
  }
  .socials a {
    color: var(--yellow);
    text-decoration: none;
    line-height: 1;
    transition: color .2s ease, transform .2s ease;
  }
  .socials a.at { color: var(--yellow); font-size: 60px; }
  .socials a.ln { color: var(--yellow); }
  .socials a:hover { transform: translateY(-2px); }

  /* CTA block */
  .cta {
    margin-top: 74px;
    margin-left: -26px;
    margin-right: -26px;
    padding: 68px 26px 72px;
    text-align: left;
    background-image:
      linear-gradient(90deg, rgba(0,0,0,0.48) 0%, rgba(0,0,0,0.28) 55%, rgba(0,0,0,0.45) 100%),
      url("./assets/BG%20WORK.jpg");
    background-size: 145%;
    background-position: center center;
    background-repeat: no-repeat;
  }
  .cta-title {
    font-family: "Morganite", "Barlow Condensed", sans-serif;
    text-transform: uppercase;
    font-weight: 700;
    font-size: 60px;
    line-height: 0.85;
    letter-spacing: 0;
    margin: 0 0 18px;
    text-align: left;
    color: var(--white);
  }
  .cta-title .accent { color: var(--yellow); }

  .cta-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-left: 0;
    margin-right: 0;
    background: var(--yellow);
    color: #1a1a1a;
    border: none;
    border-radius: 6px;
    padding: 13px 32px;
    font-family: "Morganite", "Barlow Condensed", sans-serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .2s ease, transform .12s ease, box-shadow .2s ease;
    box-shadow: 0 1px 0 rgba(0,0,0,0.2);
  }
  .cta-button:hover { background: var(--yellow-deep); }
  .cta-button:active { transform: translateY(1px); }
  .cta-button:focus-visible { outline: 2px solid var(--yellow); outline-offset: 3px; }

  /* WORK SECTION */
  .work {
    margin-top: 86px;
    padding-top: 12px;
  }
  .section-title {
    font-family: "Morganite", "Barlow Condensed", sans-serif;
    text-transform: uppercase;
    font-weight: 700;
    font-size: 60px;
    line-height: 0.85;
    letter-spacing: 0;
    margin: 0;
  }
  .section-title .accent { color: var(--yellow); }

  .section-heading-row {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 20px;
  }

  .view-more {
    font-family: "Morganite", "Barlow Condensed", sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--yellow);
    text-decoration: none;
    line-height: 1.2;
  }

  .view-more:hover {
    text-decoration: underline;
  }

  .work-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .work-tile {
    position: relative;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    border-radius: 2px;
    background: #1a1a1a;
    display: block;
    text-decoration: none;
    cursor: pointer;
    transition: transform 180ms ease;
  }
  .work-tile img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    filter: grayscale(100%);
  }
  .work-tile::after {
    /* very subtle B&W vignette consistent with the screenshot */
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 60%, rgba(0,0,0,0.35) 100%);
    pointer-events: none;
  }

  .work-tile:hover {
    transform: translateY(-2px);
  }

  .work-tile {
    transition: transform 180ms ease;
  }

  /* CLIENTS */
  .clients {
    margin-top: 72px;
    padding-top: 0;
  }
  .clients-marquee {
    width: calc(100% + 52px);
    margin-left: -26px;
    margin-right: -26px;
    margin-top: 8px;
    overflow: hidden;
    position: relative;
  }

  .clients-track {
    display: flex;
    align-items: center;
    width: max-content;
    animation: clients-scroll 24s linear infinite;
  }

  .clients-track img {
    width: 1120px;
    height: auto;
    display: block;
    flex: 0 0 auto;
    filter: grayscale(100%);
  }

  @keyframes clients-scroll {
    from {
      transform: translateX(0);
    }
    to {
      transform: translateX(-1120px);
    }
  }

  /* FOOTER */
  .footer {
    margin-top: 30px;
    margin-left: -26px;
    margin-right: -26px;
    padding: 56px 26px 28px;
    font-family: "Morganite", "Barlow Condensed", sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    background-image:
      linear-gradient(90deg, rgba(0,0,0,0.52) 0%, rgba(0,0,0,0.32) 55%, rgba(0,0,0,0.50) 100%),
      url("./assets/BG WORK.jpg");
    background-size: 145%;
    background-position: center center;
    background-repeat: no-repeat;
  }
  .footer-logo {
    width: 46px;
    height: auto;
    display: block;
    margin-bottom: 24px;
  }
  .footer-msg {
    font-size: 24px;
    font-weight: 900;
    line-height: 1;
    color: var(--white);
  }
  .footer-msg .accent { color: var(--yellow); }
  .footer-copy {
    margin-top: 28px;
    font-size: 20px;
    font-weight: 900;
    color: var(--white);
    opacity: 0.85;
    letter-spacing: 0.04em;
  }

  /* ----------  CONTACT SHEET (slide-up bottom form)  ---------- */
  .contact-sheet {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.52);
    z-index: 99999;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 250ms ease;
  }

  .contact-sheet.is-open {
    opacity: 1;
    pointer-events: auto;
  }

  .contact-form {
    width: 100%;
    max-width: 402px;
    max-height: calc(100vh - 46px);
    background: var(--form-bg);
    padding: 18px 16px 25px;
    position: relative;
    overflow-y: auto;
    border-radius: 8px 8px 0 0;
    transform: translateY(100%);
    transition: transform 350ms cubic-bezier(0.22, 0.61, 0.36, 1);
    touch-action: pan-y;
    will-change: transform;
  }

  .contact-sheet.is-open .contact-form {
    transform: translateY(0);
  }

  .sheet-drag-handle {
    width: 42px;
    height: 5px;
    border-radius: 999px;
    background: #cbd5e1;
    margin: 0 auto 16px;
  }

  .contact-form .form-inner {
    margin-top: 38px;
  }

  .field-group { margin-bottom: 24px; }

  .label {
    display: block;
    margin-bottom: 7px;
    font-family: "Morganite", "Barlow Condensed", sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    font-size: 30px;
    font-weight: 900;
    line-height: 0.9;
    color: var(--label);
  }

  .input {
    width: 100%;
    height: 48px;
    border: 1px solid var(--input-border);
    border-radius: 4px;
    background: var(--field-bg);
    padding: 0 15px;
    font-family: "Morganite", "Barlow Condensed", sans-serif;
    font-size: 30px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--field-text);
    outline: none;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
    -webkit-appearance: none;
    appearance: none;
  }
  .input::placeholder { color: var(--placeholder); }
  .input:focus,
  .textarea:focus,
  .phone-number:focus {
    border-color: var(--focus-border);
    box-shadow: 0 0 0 2px rgba(148, 163, 184, 0.18);
  }

  /* Phone */
  .phone-input {
    width: 100%;
    height: 48px;
    border: 1px solid var(--input-border);
    border-radius: 4px;
    background: var(--field-bg);
    display: flex;
    align-items: center;
    padding: 0 15px;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
  }
  .country-code {
    display: flex;
    align-items: center;
    gap: 4px;
    font-family: "Morganite", "Barlow Condensed", sans-serif;
    font-size: 30px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--field-text);
    flex: 0 0 auto;
  }
  .chevron {
    width: 7px;
    height: 7px;
    border-right: 1.5px solid #334155;
    border-bottom: 1.5px solid #334155;
    transform: rotate(45deg);
    margin-top: -3px;
  }
  .phone-number {
    margin-left: 16px;
    width: 100%;
    border: 0;
    outline: none;
    background: transparent;
    font-family: "Morganite", "Barlow Condensed", sans-serif;
    font-size: 30px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--field-text);
  }
  .phone-number::placeholder {
    color: var(--placeholder);
  }

  .message-group { margin-bottom: 0; }
  .textarea {
    width: 100%;
    height: 128px;
    border: 1px solid var(--input-border);
    border-radius: 4px;
    background: var(--field-bg);
    padding: 12px 15px;
    font-family: "Morganite", "Barlow Condensed", sans-serif;
    font-size: 30px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--field-text);
    outline: none;
    resize: none;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
  }

  .honeypot-field {
    position: absolute;
    left: -9999px;
    opacity: 0;
    pointer-events: none;
  }

  .submit-button {
    width: 100%;
    height: 48px;
    margin-top: 28px;
    text-align: center;
    border: none;
    border-radius: 4px;
    background: var(--button-bg);
    color: var(--button-text);
    font-family: "Morganite", "Barlow Condensed", sans-serif;
    font-size: 30px;
    font-weight: 900;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .2s ease, transform .12s ease;
  }
  .submit-button:hover { background: var(--button-hover); }
  .submit-button:active { transform: translateY(1px); }

  /* prevent background scroll when sheet is open */
  body.lock { overflow: hidden; }

  /* Tap area enlargement for touch */
  @media (hover: none) {
    .cta-button { padding: 14px 34px; }
  }
</style>

<script>
  // Desktop visitors go to Instagram. Mobile visitors stay on this website.
  (function () {
    const instagramUrl = "https://www.instagram.com/wissamportfolio/";
    const isMobileDevice = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    const isSmallScreen = window.matchMedia("(max-width: 768px)").matches;

    if (!isMobileDevice && !isSmallScreen) {
      window.location.replace(instagramUrl);
    }
  })();
</script>
</head>

<section class="contact-sheet" id="contactSheet" aria-hidden="true">
  <form
    class="contact-form"
    id="contactForm"
    name="contact"
    method="POST"
    action="https://formsubmit.co/wissam@wissamdesigns.com"
  >
    <div class="sheet-drag-handle" aria-hidden="true"></div>
    <input type="hidden" name="_subject" value="New message from Wissam Designs website" />
    <input type="hidden" name="_captcha" value="false" />
    <input type="hidden" name="_template" value="table" />

    <div class="form-inner">
      <div class="field-group">
        <label class="label" for="fullName">Full Name</label>
        <input id="fullName" name="name" class="input" type="text" placeholder="Full Name" autocomplete="name" required />
      </div>

      <div class="field-group">
        <label class="label" for="email">Email</label>
        <input id="email" name="email" class="input" type="email" placeholder="you@company.com" autocomplete="email" required />
      </div>

      <div class="field-group">
        <label class="label" for="phone">Phone number</label>
        <div class="phone-input">
          <div class="country-code">
            <span>LB</span>
            <span class="chevron"></span>
          </div>
          <input
            id="phone"
            name="phone"
            class="phone-number"
            type="tel"
            placeholder="+961 (0) 000 000"
            autocomplete="tel"
          />
        </div>
      </div>

      <div class="field-group message-group">
        <label class="label" for="message">Message</label>
        <textarea id="message" name="message" class="textarea" required></textarea>
      </div>

      <button class="submit-button" type="submit">Send message</button>
    </div>
  </form>
</section>

<script>
  const openButton = document.getElementById("openContactForm");
  const sheet = document.getElementById("contactSheet");
  const form = document.getElementById("contactForm");

  let dragStartY = 0;
  let currentDragY = 0;
  let isDragging = false;

  function openSheet() {
    sheet.classList.add("is-open");
    sheet.setAttribute("aria-hidden", "false");
    document.body.classList.add("lock");
    form.style.transform = "";
    setTimeout(() => document.getElementById("fullName").focus({ preventScroll: true }), 360);
  }

  function closeSheet() {
    sheet.classList.remove("is-open");
    sheet.setAttribute("aria-hidden", "true");
    document.body.classList.remove("lock");
    form.style.transform = "";
    if (openButton) openButton.focus({ preventScroll: true });
  }

  openButton.addEventListener("click", openSheet);

  // Close when pressing outside the contact form.
  sheet.addEventListener("click", (e) => {
    if (e.target === sheet) closeSheet();
  });

  // Close on Escape.
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && sheet.classList.contains("is-open")) closeSheet();
  });

  // Drag down to close.
  form.addEventListener("touchstart", (e) => {
    dragStartY = e.touches[0].clientY;
    currentDragY = 0;
    isDragging = true;
    form.style.transition = "none";
  }, { passive: true });

  form.addEventListener("touchmove", (e) => {
    if (!isDragging) return;

    currentDragY = e.touches[0].clientY - dragStartY;

    if (currentDragY > 0) {
      form.style.transform = `translateY(${currentDragY}px)`;
    }
  }, { passive: true });

  form.addEventListener("touchend", () => {
    if (!isDragging) return;

    isDragging = false;
    form.style.transition = "";

    if (currentDragY > 90) {
      closeSheet();
    } else {
      form.style.transform = "";
    }
  });

  // Desktop mouse drag support.
  form.addEventListener("mousedown", (e) => {
    if (!sheet.classList.contains("is-open")) return;
    dragStartY = e.clientY;
    currentDragY = 0;
    isDragging = true;
    form.style.transition = "none";
  });

  document.addEventListener("mousemove", (e) => {
    if (!isDragging) return;

    currentDragY = e.clientY - dragStartY;

    if (currentDragY > 0) {
      form.style.transform = `translateY(${currentDragY}px)`;
    }
  });

  document.addEventListener("mouseup", () => {
    if (!isDragging) return;

    isDragging = false;
    form.style.transition = "";

    if (currentDragY > 90) {
      closeSheet();
    } else {
      form.style.transform = "";
    }
  });


  // Try a few safe file paths for the CTA/footer background.
  // This helps when GitHub stores the image as JPG/JPEG or inside/outside assets.
  const bgCandidates = [
    "./assets/BG WORK.jpg",
    "./assets/BG WORK.JPG",
    "./assets/BG WORK.jpeg",
    "./assets/BG WORK.JPEG",
    "./BG WORK.jpg",
    "./BG WORK.JPG"
  ];

  function setWorkBackground(url) {
    const imageLayer = `linear-gradient(90deg, rgba(0,0,0,0.48) 0%, rgba(0,0,0,0.28) 55%, rgba(0,0,0,0.45) 100%), url("${url}")`;
    document.querySelectorAll(".cta, .footer").forEach((section) => {
      section.style.backgroundImage = imageLayer;
    });
  }

  function testBackground(index = 0) {
    if (index >= bgCandidates.length) return;

    const testImage = new Image();
    testImage.onload = () => setWorkBackground(bgCandidates[index]);
    testImage.onerror = () => testBackground(index + 1);
    testImage.src = bgCandidates[index];
  }

  testBackground();


  // Static GitHub Pages form: submission is handled by FormSubmit.
</script>
</body>
</html>
